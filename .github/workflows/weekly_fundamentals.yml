name: Haftalık Temel Analiz Güncellemesi

on:
  schedule:
    - cron: '0 3 * * 0' # Her Pazar 03:00 UTC (TR: 06:00)
  workflow_dispatch:      # Manuel tetikleme için

permissions:
  contents: write

jobs:
  update-fundamentals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pandas numpy requests yfinance isyatirimhisse ta
          pip install git+https://github.com/rongardF/tvdatafeed.git
          pip install xgboost scikit-learn

      - name: Run Fundamental Update
        run: python update_fundamentals_service.py
        env:
          PYTHONPATH: .

      - name: Commit and Push Database
        run: |
          git config --global user.name "Fundamental Updater"
          git config --global user.email "fund-update@github.com"
          git add fundamental_data.db
          git commit -m "Auto-update: Weekly fundamental data records [skip ci]" || echo "No changes to commit"
          git push
