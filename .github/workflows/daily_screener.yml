name: Otomatik Tarama (Aktif)

on:
  schedule:
    # Pazartesi-Cuma, 06:00-21:00 UTC (TR: 09:00 - 00:00) arası her 15 dakikada bir
    - cron: '*/15 6-20 * * 1-5'
  workflow_dispatch: # Manuel Tetikleme İmkanı

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      ACTIONS_STEP_DEBUG: true
    strategy:
      fail-fast: false
      matrix:
        market: [BIST, NASDAQ] # CRYPTO Modülü Çıkartıldı
    timeout-minutes: 45
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.market }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Taramayı Başlat (Self-Healing ile)
        uses: nick-fields/retry@v3
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_MARKET: ${{ matrix.market }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          timeout_minutes: 12
          max_attempts: 2
          command: python github_scan_action.py

      - name: Sinyalleri Kaydet ve Pushla
        if: always()
        run: |
          git config --global user.name "AI Signals Logger"
          git config --global user.email "logger@github.com"
          
          # 1. Dosyaları Ekle ve Commit Et (Zaten bir şeyler varsa)
          git add signals_log.db || true
          git commit -m "Auto-log: Recorded signals for ${{ matrix.market }} [skip ci]" || echo "Değişiklik yok"
          
          # 2. Üstteki çakışmaları önlemek için Güçlü Stash Kontrolü
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -u
            git stash --include-untracked
          fi
          
          # 3. Pull ve Push Döngüsü (Retry Mekanizması ile)
          for i in {1..5}; do
            git fetch origin main
            git pull --rebase origin main && \
            (git stash pop || true) && \
            git push origin main && break || \
            (sleep $((RANDOM % 10 + 2)))
          done
