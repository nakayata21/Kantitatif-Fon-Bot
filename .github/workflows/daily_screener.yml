name: 15 Dakikalık Otomatik Tarama

on:
  schedule:
    # Pazartesi-Cuma, 06:00-21:00 UTC (TR: 09:00 - 00:00) arası her 15 dakikada bir
    - cron: '*/15 6-20 * * 1-5'
  workflow_dispatch: # Manuel tetikleme için

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        market: [BIST, NASDAQ]
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pandas requests yfinance ta scikit-learn numba plotly
          pip install git+https://github.com/rongardF/tvdatafeed.git
          pip install isyatirimhisse vectorbt || true
          
      - name: Taramayı Başlat
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_MARKET: ${{ matrix.market }}
        run: python github_scan_action.py
