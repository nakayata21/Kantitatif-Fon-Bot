name: 15 Dakikalık Otomatik Tarama

on:
  schedule:
    # Pazartesi-Cuma, 06:00-21:00 UTC (TR: 09:00 - 00:00) arası her 15 dakikada bir
    - cron: '*/15 6-20 * * 1-5'
  workflow_dispatch: # Manuel tetikleme için

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      ACTIONS_STEP_DEBUG: true
    strategy:
      fail-fast: false
      matrix:
        market: [BIST, NASDAQ, CRYPTO]
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.market }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Taramayı Başlat (Self-Healing ile)
        uses: nick-fields/retry@v3
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_MARKET: ${{ matrix.market }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          timeout_minutes: 12
          max_attempts: 2
          command: python github_scan_action.py

      - name: Sinyalleri Kaydet ve Pushla (Kendi Kendine Öğrenme İçin)
        if: always()
        run: |
          git config --global user.name "AI Signals Logger"
          git config --global user.email "logger@github.com"
          git add signals_log.db
          git fetch origin main
          git pull --rebase origin main
          # Retry push to handle concurrent market runners (BIST, NASDAQ, CRYPTO)
          for i in {1..5}; do
            git push origin main && break || (git fetch origin main && git pull --rebase origin main && sleep $((RANDOM % 10 + 1)))
          done
